<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高峰熱話 - 頻道管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif; background-color: #f3f4f6; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="text-gray-800">

    <div id="loginScreen" class="min-h-screen flex items-center justify-center bg-gray-900 p-4">
        <div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-sm text-center">
            <h1 class="text-2xl font-bold mb-2 text-gray-800">高峰熱話</h1>
            <p class="text-gray-500 mb-6 text-sm">內部營運管理系統</p>
            <input type="password" id="passwordInput" placeholder="請輸入登入密碼" class="w-full p-3 border border-gray-300 rounded-lg mb-4 focus:outline-none focus:border-blue-500">
            <button onclick="checkPassword()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition">登入系統</button>
            <p id="errorMsg" class="text-red-500 text-sm mt-3 hidden">密碼錯誤，請重試。</p>
        </div>
    </div>

    <div id="mainApp" class="hidden flex flex-col md:flex-row min-h-screen">
        
        <div class="w-full md:w-1/3 lg:w-1/4 bg-gray-800 text-white p-6 flex flex-col">
            <h2 class="text-xl font-bold mb-6 text-blue-400">📊 營運資訊板</h2>
            
            <div class="bg-gray-700 p-4 rounded-lg mb-6 shadow-inner">
                <h3 class="text-sm text-gray-300 mb-1">總廣告收入 (未扣除支出)</h3>
                <p id="totalIncome" class="text-2xl font-bold text-green-400">$0</p>
                <div class="h-px bg-gray-600 my-3"></div>
                <h3 class="text-sm text-gray-300 mb-1">總 Google Ads 投放/成本</h3>
                <p id="totalExpense" class="text-xl font-bold text-red-400">-$0</p>
                <div class="h-px bg-gray-600 my-3"></div>
                <h3 class="text-sm text-gray-300 mb-1">實際淨利潤 (收支平衡)</h3>
                <p id="netProfit" class="text-3xl font-bold text-blue-300">$0</p>
            </div>

            <div class="bg-gray-700 p-4 rounded-lg mb-6 shadow-inner">
                <h3 class="text-md font-bold mb-2 text-yellow-400">⚠️ 未收款項提示</h3>
                <ul id="unpaidList" class="text-sm space-y-2">
                    </ul>
            </div>
        </div>

        <div class="w-full md:w-2/3 lg:w-3/4 p-6 overflow-y-auto">
            
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-gray-800">📅 廣告項目與日程</h2>
                <button onclick="toggleForm()" class="bg-green-600 text-white px-4 py-2 rounded-lg shadow hover:bg-green-700 text-sm font-bold">+ 新增項目</button>
            </div>

            <div id="addForm" class="hidden bg-white p-5 rounded-xl shadow-md mb-6 border-l-4 border-green-500">
                <h3 class="font-bold text-lg mb-4">記錄新廣告項目</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <div><label class="block text-sm text-gray-600 mb-1">客戶/餐廳名稱</label><input type="text" id="pName" class="w-full p-2 border rounded"></div>
                    <div><label class="block text-sm text-gray-600 mb-1">拍攝日期</label><input type="date" id="pShootDate" class="w-full p-2 border rounded"></div>
                    <div><label class="block text-sm text-gray-600 mb-1">出片死線 (Deadline)</label><input type="date" id="pDeadline" class="w-full p-2 border rounded"></div>
                    <div><label class="block text-sm text-gray-600 mb-1">廣告收入 (HK$)</label><input type="number" id="pIncome" class="w-full p-2 border rounded" placeholder="例如: 5000"></div>
                    <div><label class="block text-sm text-gray-600 mb-1">Ads 投放費用 (HK$)</label><input type="number" id="pAds" class="w-full p-2 border rounded" placeholder="例如: 500"></div>
                    <div><label class="block text-sm text-gray-600 mb-1">其他成本 (車資/食宿)</label><input type="number" id="pOther" class="w-full p-2 border rounded" placeholder="例如: 200"></div>
                    <div><label class="block text-sm text-gray-600 mb-1">收款狀態</label>
                        <select id="pStatus" class="w-full p-2 border rounded bg-white">
                            <option value="unpaid">🔴 未收款</option>
                            <option value="paid">🟢 已入帳</option>
                        </select>
                    </div>
                </div>
                <div class="flex justify-end space-x-2">
                    <button onclick="toggleForm()" class="px-4 py-2 bg-gray-300 rounded hover:bg-gray-400">取消</button>
                    <button onclick="saveProject()" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 font-bold">儲存記錄</button>
                </div>
            </div>

            <div id="projectList" class="space-y-4">
                </div>

        </div>
    </div>

    <script>
        // --- 1. 系統登入功能 ---
        const CORRECT_PW = "A21331238a@";

        function checkPassword() {
            const input = document.getElementById('passwordInput').value;
            if(input === CORRECT_PW) {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                loadData(); // 載入資料
            } else {
                document.getElementById('errorMsg').classList.remove('hidden');
            }
        }

        // --- 2. 資料管理 (使用瀏覽器 LocalStorage) ---
        let projects = JSON.parse(localStorage.getItem('ytProjects')) || [];

        function toggleForm() {
            const form = document.getElementById('addForm');
            form.classList.toggle('hidden');
        }

        function saveProject() {
            const name = document.getElementById('pName').value;
            const shootDate = document.getElementById('pShootDate').value;
            const deadline = document.getElementById('pDeadline').value;
            const income = parseFloat(document.getElementById('pIncome').value) || 0;
            const ads = parseFloat(document.getElementById('pAds').value) || 0;
            const other = parseFloat(document.getElementById('pOther').value) || 0;
            const status = document.getElementById('pStatus').value;

            if(!name || !deadline) {
                alert("請填寫項目名稱及出片死線！");
                return;
            }

            const newProject = {
                id: Date.now(), name, shootDate, deadline, income, ads, other, status
            };

            projects.push(newProject);
            projects.sort((a, b) => new Date(a.deadline) - new Date(b.deadline)); // 按死線排序
            localStorage.setItem('ytProjects', JSON.stringify(projects));
            
            // 清空表單並重新整理畫面
            document.querySelectorAll('input').forEach(input => { if(input.type !== 'password') input.value = '' });
            toggleForm();
            loadData();
        }

        function deleteProject(id) {
            if(confirm("確定要刪除這個記錄嗎？")) {
                projects = projects.filter(p => p.id !== id);
                localStorage.setItem('ytProjects', JSON.stringify(projects));
                loadData();
            }
        }

        function togglePaidStatus(id) {
            const project = projects.find(p => p.id === id);
            project.status = project.status === 'paid' ? 'unpaid' : 'paid';
            localStorage.setItem('ytProjects', JSON.stringify(projects));
            loadData();
        }

        // --- 3. 渲染畫面與計算數據 ---
        function loadData() {
            const listDiv = document.getElementById('projectList');
            const unpaidListDiv = document.getElementById('unpaidList');
            listDiv.innerHTML = '';
            unpaidListDiv.innerHTML = '';

            let totalInc = 0, totalExp = 0;
            const today = new Date();
            today.setHours(0,0,0,0);

            projects.forEach(p => {
                // 計算收支
                const cost = p.ads + p.other;
                const profit = p.income - cost;
                totalInc += p.income;
                totalExp += cost;

                // 計算倒數日數
                const dDate = new Date(p.deadline);
                const diffTime = dDate - today;
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                
                let deadlineBadge = '';
                if(diffDays < 0) deadlineBadge = `<span class="bg-red-100 text-red-700 px-2 py-1 rounded text-xs font-bold border border-red-300">過期 ${Math.abs(diffDays)} 日</span>`;
                else if(diffDays === 0) deadlineBadge = `<span class="bg-red-500 text-white px-2 py-1 rounded text-xs font-bold shadow-sm">🔥 今日交片</span>`;
                else if(diffDays <= 3) deadlineBadge = `<span class="bg-orange-100 text-orange-700 px-2 py-1 rounded text-xs font-bold">⏳ 剩餘 ${diffDays} 日</span>`;
                else deadlineBadge = `<span class="bg-green-100 text-green-700 px-2 py-1 rounded text-xs font-bold">還剩 ${diffDays} 日</span>`;

                // 未收款提示
                if(p.status === 'unpaid') {
                    unpaidListDiv.innerHTML += `<li class="flex justify-between border-b border-gray-600 pb-1"><span>${p.name}</span> <span class="text-red-300 font-mono">$${p.income}</span></li>`;
                }

                const statusBtnClass = p.status === 'paid' ? 'bg-green-100 text-green-700 border-green-300' : 'bg-red-100 text-red-700 border-red-300';
                const statusText = p.status === 'paid' ? '✅ 已入帳' : '⚠️ 未收款 (點擊更改)';

                // 建立卡片
                listDiv.innerHTML += `
                    <div class="bg-white p-4 md:p-5 rounded-xl shadow-sm border border-gray-100 flex flex-col md:flex-row justify-between items-start md:items-center hover:shadow-md transition">
                        <div class="mb-3 md:mb-0 w-full md:w-1/2">
                            <div class="flex items-center space-x-3 mb-2">
                                <h4 class="text-lg font-bold text-gray-800">${p.name}</h4>
                                ${deadlineBadge}
                            </div>
                            <div class="text-sm text-gray-500 grid grid-cols-2 gap-2 mt-2">
                                <div><span class="inline-block w-4">🎥</span> 拍攝: ${p.shootDate || '未定'}</div>
                                <div><span class="inline-block w-4">📅</span> 出片: <span class="font-bold">${p.deadline}</span></div>
                            </div>
                        </div>
                        <div class="w-full md:w-1/2 flex flex-col items-end border-t md:border-t-0 md:border-l border-gray-200 pt-3 md:pt-0 md:pl-4">
                            <div class="w-full flex justify-between md:justify-end md:space-x-4 mb-2 text-sm">
                                <div class="text-left md:text-right">
                                    <div class="text-gray-500 text-xs">收入</div>
                                    <div class="font-bold text-green-600">+$${p.income}</div>
                                </div>
                                <div class="text-left md:text-right">
                                    <div class="text-gray-500 text-xs">Ads/成本</div>
                                    <div class="font-bold text-red-500">-$${cost}</div>
                                </div>
                                <div class="text-left md:text-right">
                                    <div class="text-gray-500 text-xs">淨利潤</div>
                                    <div class="font-bold text-blue-600 text-lg">$${profit}</div>
                                </div>
                            </div>
                            <div class="w-full flex justify-end space-x-2 mt-2">
                                <button onclick="togglePaidStatus(${p.id})" class="px-3 py-1 border rounded text-xs font-bold ${statusBtnClass} transition hover:opacity-80">${statusText}</button>
                                <button onclick="deleteProject(${p.id})" class="px-3 py-1 bg-gray-200 text-gray-600 rounded text-xs hover:bg-gray-300">刪除</button>
                            </div>
                        </div>
                    </div>
                `;
            });

            if(unpaidListDiv.innerHTML === '') unpaidListDiv.innerHTML = '<li class="text-green-400">目前所有款項已收齊！🎉</li>';
            if(listDiv.innerHTML === '') listDiv.innerHTML = '<div class="text-center text-gray-400 py-10">目前沒有進行中的項目，點擊上方按鈕新增！</div>';

            // 更新儀表板數字
            document.getElementById('totalIncome').innerText = '$' + totalInc.toLocaleString();
            document.getElementById('totalExpense').innerText = '-$' + totalExp.toLocaleString();
            document.getElementById('netProfit').innerText = '$' + (totalInc - totalExp).toLocaleString();
        }
    </script>
</body>
</html>
